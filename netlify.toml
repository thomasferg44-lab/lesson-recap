[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/process-recap"
  to = "/.netlify/functions/process-recap"
  status = 200

[[redirects]]
  from = "/api/get-sessions"
  to = "/.netlify/functions/get-sessions"
  status = 200

[[redirects]]
  from = "/api/weekly-summary"
  to = "/.netlify/functions/weekly-summary"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200